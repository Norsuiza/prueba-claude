name: Build ChatPoli APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('mobile/buildozer.spec') }}

      - name: Cache buildozer local
        uses: actions/cache@v4
        with:
          path: mobile/.buildozer
          key: buildozer-local-${{ hashFiles('mobile/buildozer.spec') }}-${{ github.sha }}
          restore-keys: |
            buildozer-local-${{ hashFiles('mobile/buildozer.spec') }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel git \
            openjdk-17-jdk unzip wget zip \
            libffi-dev libssl-dev zlib1g-dev \
            build-essential ccache autoconf automake libtool \
            pkg-config

      - name: Install buildozer and cython
        run: pip install buildozer==1.5.0 cython==3.0.3

      - name: Build APK
        working-directory: mobile
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChatPoli-APK
          path: mobile/bin/*.apk
          retention-days: 30
